# Combined Node.js CI and Firebase Hosting Deploy Workflow
# Runs checks on both push and pull_request, deploys only on push to main after successful build

name: Node.js CI & Firebase Deploy

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup

      - name: Lint code
        run: npm run lint:check

      - name: Check code formatting
        run: npm run format:check

      - name: Run tests
        run: npm run coverage

      - name: Run mutation testing
        run: npm run mutation

      - name: Build project
        run: npm run build

  e2e:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup

      - name: Install Playwright browsers
        run: npm run e2e:install-browsers

      - name: Run e2e tests
        run: npm run e2e:test

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build, e2e]
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup

      - name: Build project
        run: npm run build

      - uses: FirebaseExtended/action-hosting-deploy@e2eda2e106cfa35cdbcf4ac9ddaf6c4756df2c8c # 0.10.0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MCCLAINCOOKBOOK }}
          channelId: live
          projectId: mcclaincookbook
