# Combined Node.js CI and Firebase Hosting Deploy Workflow
# Runs checks on both push and pull_request, deploys only on push to main after successful build

name: Node.js CI & Firebase Deploy

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # 6.0.3

      - name: Use Node.js 24.x
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # 6.4.0
        with:
          node-version: 24.x
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Check signatures
        run: npm audit signatures

      - name: Lint code
        run: npm run lint:check

      - name: Check code formatting
        run: npm run format:check

      - name: Run tests
        run: npm run coverage

      - name: Build project
        run: npm run build

  e2e:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # 6.0.3

      - name: Use Node.js 24.x
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # 6.4.0
        with:
          node-version: 24.x
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Check signatures
        run: npm audit signatures

      - name: Install Playwright browsers
        run: npm run e2e:install-browsers

      - name: Run e2e tests
        run: npm run e2e:test

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build, e2e]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # 6.0.3

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Check signatures
        run: npm audit signatures

      - name: Build project
        run: npm run build

      - uses: FirebaseExtended/action-hosting-deploy@e2eda2e106cfa35cdbcf4ac9ddaf6c4756df2c8c # 0.10.0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MCCLAINCOOKBOOK }}
          channelId: live
          projectId: mcclaincookbook
